schema_version: 1

context:
  name: curl-cffi
  version: "0.15.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/curl_cffi-${{ version }}.tar.gz
  sha256: ea0c67652bf6893d34ee0f82c944f37e488f6147e9421bef1771cc6545b02ded

build:
  number: 1
  skip: win
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
  host:
    - python
    - wheel
    - setuptools
    - cffi >=1.12.0
    - pip
  run:
    - rich
    - python
    - cffi >=2.0.0
    - certifi >=2024.2.2

tests:
  - python:
      imports:
        - curl_cffi
      pip_check: true

about:
  summary: libcurl ffi bindings for Python, with impersonation support.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/lexiforest/curl_cffi

extra:
  recipe-maintainers:
    - jan-janssen
